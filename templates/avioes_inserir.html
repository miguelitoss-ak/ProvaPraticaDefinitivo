<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Adicionar Nova Carta</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container py-5">

    <div class="card shadow mx-auto" style="max-width: 500px;">
        <div class="card-body">

            <h3 class="text-center mb-4">🛩️ Adicionar Avião</h3>

            <form action="avioes_inserir.php" method="POST" id="formAviao">

                <!-- Modelo -->
                <div class="mb-3">
                    <label class="form-label">Modelo</label>
                    <input type="text" name="modelo" id="modelo" class="form-control" required>
                </div>

                <!-- Fabricante -->
                <div class="mb-3">
                    <label class="form-label">Fabricante</label>
                    <input type="text" name="fabricante" class="form-control" required>
                </div>

                <!-- Ano -->
                <div class="mb-3">
                    <label class="form-label">Ano de Lançamento</label>
                    <input type="number" name="ano" id="ano" class="form-control" required>
                </div>

                <!-- Raridade -->
                <div class="mb-3">
                    <label class="form-label">Raridade</label>
                    <select name="raridade" class="form-select">
                        <option>Comum</option>
                        <option>Raro</option>
                        <option>Épico</option>
                        <option>Lendário</option>
                    </select>
                </div>

                <!-- Categoria -->
                <div class="mb-3">
                    <label class="form-label">Categoria</label><br>

                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="categoria" value="Civil" checked>
                        <label class="form-check-label">Civil</label>
                    </div>

                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="categoria" value="Militar">
                        <label class="form-check-label">Militar</label>
                    </div>
                </div>

                <!-- Descrição -->
                <div class="mb-3">
                    <label class="form-label">Descrição</label>
                    <textarea name="descricao" class="form-control" rows="3" maxlength="200"></textarea>
                </div>

                <!-- Botões -->
                <div class="d-flex justify-content-between">
                    <a href="index.php" class="btn btn-secondary">Voltar</a>
                    <button type="submit" class="btn btn-success">Criar Carta</button>
                </div>

            </form>

        </div>
    </div>

</div>

<script>
document.getElementById('formAviao').onsubmit = function(e) {
    const ano = document.getElementById('ano').value;
    const atual = new Date().getFullYear();

    if (ano > atual + 5 || ano < 1900) {
        alert("Por favor, insira um ano válido!");
        e.preventDefault();
    }
};
</script>

</body>
</html>
