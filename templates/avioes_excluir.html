<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Excluir Avião</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container py-5">

    <div class="card shadow mx-auto border-danger" style="max-width: 500px;">
        <div class="card-body text-center">

            <h3 class="text-danger mb-3">⚠️ Confirmar Exclusão</h3>

            <p>Você tem certeza que deseja excluir esta carta?</p>

            <!-- Preview do avião -->
            <div class="mb-3">
                <h5>{{ aviao.modelo }}</h5>
                <p class="text-muted">
                    {{ aviao.fabricante }} • {{ aviao.ano_lancamento }}
                </p>

                <span class="badge 
    {% if aviao.raridade == 'Comum' %}bg-secondary
    {% elseif aviao.raridade == 'Raro' %}bg-primary
    {% elseif aviao.raridade == 'Épico' %}bg-success
    {% elseif aviao.raridade == 'Lendário' %}bg-warning
    {% endif %}
">
    {{ aviao.raridade }}
</span>
            </div>

            <!-- Form -->
            <form method="POST" action="avioes_excluir.php">

                <input type="hidden" name="id" value="{{ aviao.id }}">

                <div class="d-flex justify-content-between mt-4">
                    <a href="index.php" class="btn btn-secondary">Cancelar</a>
                    <button type="submit" class="btn btn-danger">
                        🗑️ Excluir
                    </button>
                </div>

            </form>

        </div>
    </div>

</div>

</body>
</html>
