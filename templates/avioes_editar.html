<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Adicionar Nova Carta</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container py-5">

    <div class="card shadow mx-auto" style="max-width: 500px;">
        <div class="card-body">

            <h3 class="text-center mb-4">✏️ Editar Avião</h3>

            <form method="POST" action="avioes_editar.php">

                <input type="hidden" name="id" value="{{ aviao.id }}">

                <!-- Modelo -->
                <div class="mb-3">
                    <label class="form-label">Modelo</label>
                    <input type="text" name="modelo" class="form-control" 
                           value="{{ aviao.modelo }}" required>
                </div>

                <!-- Fabricante -->
                <div class="mb-3">
                    <label class="form-label">Fabricante</label>
                    <input type="text" name="fabricante" class="form-control" 
                           value="{{ aviao.fabricante }}" required>
                </div>

                <!-- Ano -->
                <div class="mb-3">
                    <label class="form-label">Ano de Lançamento</label>
                    <input type="number" name="ano" class="form-control" 
                           value="{{ aviao.ano_lancamento }}" required>
                </div>

                <!-- Raridade -->
                <div class="mb-3">
                    <label class="form-label">Raridade</label>
                    <select name="raridade" class="form-select">
                        <option {% if aviao.raridade == 'Comum' %}selected{% endif %}>Comum</option>
                        <option {% if aviao.raridade == 'Raro' %}selected{% endif %}>Raro</option>
                        <option {% if aviao.raridade == 'Épico' %}selected{% endif %}>Épico</option>
                        <option {% if aviao.raridade == 'Lendário' %}selected{% endif %}>Lendário</option>
                    </select>
                </div>

                <!-- Categoria -->
                <div class="mb-3">
                    <label class="form-label">Categoria</label><br>

                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="categoria" value="Civil"
                        {% if aviao.categoria == 'Civil' %}checked{% endif %}>
                        <label class="form-check-label">Civil</label>
                    </div>

                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="categoria" value="Militar"
                        {% if aviao.categoria == 'Militar' %}checked{% endif %}>
                        <label class="form-check-label">Militar</label>
                    </div>
                </div>

                <!-- Descrição -->
                <div class="mb-3">
                    <label class="form-label">Descrição</label>
                    <textarea name="descricao" class="form-control" rows="3">
{{ aviao.descricao }}
                    </textarea>
                </div>

                <!-- Botões -->
                <div class="d-flex justify-content-between">
                    <a href="index.php" class="btn btn-secondary">Voltar</a>
                    <button type="submit" class="btn btn-warning">Salvar</button>
                </div>

            </form>

        </div>
    </div>

</div>
</body>
